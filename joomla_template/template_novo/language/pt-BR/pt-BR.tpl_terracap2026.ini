TPL_TERRACAP2026_FIELD_LOGO_LABEL="Logotipo"
TPL_TERRACAP2026_FIELD_LOGO_DESC="Selecione o logotipo exibido no cabeçalho. Se vazio, usa a imagem oficial do portal."
TPL_TERRACAP2026_FIELD_SERVICOS_URL_LABEL="URL Serviços Online"
TPL_TERRACAP2026_FIELD_SERVICOS_URL_DESC="Endereço do portal de Serviços Online usado no botão do cabeçalho e nos atalhos."
TPL_TERRACAP2026_FIELD_ANALYTICS_LABEL="Código Google Analytics"
TPL_TERRACAP2026_FIELD_ANALYTICS_DESC="Identificador de acompanhamento do Google Analytics (ex.: UA-XXXXX-Y). Deixe vazio para desativar."


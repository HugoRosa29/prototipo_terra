; Terracap 2026 — "Eixos e Curvas"
; Traduções do template (pt-BR)

TPL_TERRACAP2026_FIELDSET_CONTEUDO_LABEL="Conteúdo"
TPL_TERRACAP2026_FIELDSET_CONTEUDO_DESC="Escolha, por área, se o template usa os módulos publicados (herdados do site atual) ou o conteúdo estático do novo protótipo. Os módulos antigos dependem do CSS/JS do template anterior; habilite cada área somente depois de adaptar os módulos ao novo estilo."
TPL_TERRACAP2026_FIELD_USAR_MODULO_MENU_LABEL="Menu: usar módulo 'menu-principal'"
TPL_TERRACAP2026_FIELD_USAR_MODULO_MENU_DESC="Se 'Sim', renderiza o módulo publicado em 'menu-principal'. Se 'Não', exibe o mega menu estático do protótipo."
TPL_TERRACAP2026_FIELD_USAR_MODULO_BANNER_LABEL="Hero: usar módulo 'super-banner'"
TPL_TERRACAP2026_FIELD_USAR_MODULO_BANNER_DESC="Se 'Sim', renderiza o módulo publicado em 'super-banner'. Se 'Não', exibe o hero estático do protótipo."
TPL_TERRACAP2026_FIELD_USAR_MODULOS_HOME_LABEL="Home: usar módulos 'pagina-inicial'"
TPL_TERRACAP2026_FIELD_USAR_MODULOS_HOME_DESC="Se 'Sim', renderiza os módulos publicados em 'pagina-inicial'. Se 'Não', exibe as seções estáticas do protótipo (indicadores, território, compre, regularize, serviços, invista, transparência, newsletter)."
TPL_TERRACAP2026_FIELD_USAR_MODULOS_RODAPE_LABEL="Rodapé: usar módulos 'rodape-1/2/3'"
TPL_TERRACAP2026_FIELD_USAR_MODULOS_RODAPE_DESC="Se 'Sim', renderiza os módulos publicados em 'rodape-1', 'rodape-2' e 'rodape-3'. Se 'Não', exibe as colunas estáticas do protótipo."

TPL_TERRACAP2026_FIELDSET_HEADER_LABEL="Cabeçalho"

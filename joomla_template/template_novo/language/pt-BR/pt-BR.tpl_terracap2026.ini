TPL_TERRACAP2026_FIELD_BOOTSTRAP_INTERNAS_LABEL="Camada legada nas internas (CSS/JS do template antigo)"
TPL_TERRACAP2026_FIELD_BOOTSTRAP_INTERNAS_DESC="Carrega, apenas nas páginas internas, o Bootstrap, o style.css do template antigo e jQuery — base de estilo/comportamento para os overrides e módulos herdados. O novo estilo carrega por cima e prevalece. Desative quando os overrides forem totalmente migrados."

TPL_TERRACAP2026_FIELDSET_CONTEUDO_LABEL="Content"
TPL_TERRACAP2026_FIELDSET_CONTEUDO_DESC="Choose, per area, whether the template renders the published modules (inherited from the current site) or the static content from the new prototype. Legacy modules depend on the previous template's CSS/JS; enable each area only after adapting its modules to the new style."
TPL_TERRACAP2026_FIELD_USAR_MODULO_MENU_LABEL="Menu: use 'menu-principal' module"
TPL_TERRACAP2026_FIELD_USAR_MODULO_MENU_DESC="If 'Yes', renders the module published at 'menu-principal'. If 'No', shows the prototype's static mega menu."
TPL_TERRACAP2026_FIELD_USAR_MODULO_BANNER_LABEL="Hero: use 'super-banner' module"
TPL_TERRACAP2026_FIELD_USAR_MODULO_BANNER_DESC="If 'Yes', renders the module published at 'super-banner'. If 'No', shows the prototype's static hero."
TPL_TERRACAP2026_FIELD_USAR_MODULOS_HOME_LABEL="Home: use 'pagina-inicial' modules"
TPL_TERRACAP2026_FIELD_USAR_MODULOS_HOME_DESC="If 'Yes', renders the modules published at 'pagina-inicial'. If 'No', shows the prototype's static sections."
TPL_TERRACAP2026_FIELD_USAR_MODULOS_RODAPE_LABEL="Footer: use 'rodape-1/2/3' modules"
TPL_TERRACAP2026_FIELD_USAR_MODULOS_RODAPE_DESC="If 'Yes', renders the modules published at 'rodape-1', 'rodape-2' and 'rodape-3'. If 'No', shows the prototype's static columns."

